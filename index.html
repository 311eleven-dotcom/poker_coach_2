<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Poker Coach">
  <meta name="theme-color" content="#1a4f2a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Poker Coach</title>
  <style>
    :root {
      --green-dark: #1a4f2a;
      --green-felt: #1d5c35;
      --green-border: #2a7040;
      --gold: #ffd700;
      --red-card: #c0392b;
      --bg: #f5f5f0;
      --bg2: #eeede8;
      --bg3: #e5e4de;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text2: #555;
      --text3: #888;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --blue-bg: #e6f1fb;
      --blue-text: #0c447c;
      --blue-border: #85b7eb;
      --green-bg: #e1f5ee;
      --green-text: #085041;
      --green-border2: #5dcaa5;
      --red-bg: #fcebeb;
      --red-text: #791f1f;
      --amber-bg: #faeeda;
      --amber-text: #633806;
      --radius: 12px;
      --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
        --card-bg: #2a2a2a; --text: #f0f0f0; --text2: #aaa; --text3: #666;
        --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
        --blue-bg: #0c2a45; --blue-text: #85b7eb;
        --green-bg: #0a2e1f; --green-text: #5dcaa5;
        --red-bg: #2e0f0f; --red-text: #f09595;
        --amber-bg: #2e1f06; --amber-text: #fac775;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); }

    /* ── LAYOUT ── */
    #app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
    #nav { display: flex; gap: 4px; padding: 8px 12px; padding-top: max(8px, env(safe-area-inset-top)); background: var(--card-bg); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .nav-btn { flex: 1; padding: 7px 4px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text2); cursor: pointer; }
    .nav-btn.active { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
    #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── TABLE ── */
    .table-wrap { padding: 10px; background: var(--bg2); }
    .felt-outer { background: var(--green-dark); border-radius: 14px; padding: 12px; position: relative; }
    .felt-ellipse { background: var(--green-felt); border-radius: 50%; width: 100%; padding-top: 50%; position: relative; border: 3px solid var(--green-border); }
    .felt-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
    .seats-wrap { position: absolute; inset: 0; pointer-events: none; }
    .seat { position: absolute; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .ava { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; position: relative; border: 2px solid rgba(255,255,255,0.2); }
    .pos-badge { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); font-size: 7px; font-weight: 700; padding: 1px 4px; border-radius: 4px; white-space: nowrap; }
    .d-chip { position: absolute; bottom: -4px; right: -4px; width: 13px; height: 13px; border-radius: 50%; background: #e8e0c0; border: 1.5px solid #bba060; font-size: 6px; font-weight: 700; color: #5a4010; display: flex; align-items: center; justify-content: center; }
    .sname { font-size: 7px; color: rgba(255,255,255,0.7); text-align: center; white-space: nowrap; max-width: 52px; overflow: hidden; text-overflow: ellipsis; }
    .sstack { font-size: 7px; color: var(--gold); font-weight: 500; }
    .sbet { font-size: 7px; background: rgba(0,0,0,0.55); color: var(--gold); padding: 1px 3px; border-radius: 3px; }
    .seat.is-hero .ava { border-color: var(--gold); border-width: 2.5px; }
    .seat.is-folded .ava { opacity: 0.3; }
    .seat.is-active .ava { border-color: #00e87a; box-shadow: 0 0 0 3px rgba(0,232,122,0.2); }
    .hole { display: flex; gap: 2px; margin-top: 2px; }
    .hcard { width: 26px; height: 36px; border-radius: 3px; background: #fff; border: 0.5px solid #bbb; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .cc-ph { width: 26px; height: 36px; border-radius: 4px; border: 1.5px dashed rgba(255,255,255,0.2); }
    .pot-label { font-size: 9px; color: var(--gold); margin-top: 2px; }

    /* ── ACTION PANEL ── */
    .ap { margin: 0 10px 10px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--card-bg); overflow: hidden; }
    .ap-head { padding: 8px 13px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .ap-title { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
    .phase-pill { font-size: 10px; background: var(--bg2); color: var(--text2); padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
    .scenario-badge { margin: 8px 10px 0; padding: 6px 10px; background: var(--bg2); border-radius: var(--radius-sm); font-size: 10px; color: var(--text2); border: 0.5px solid var(--border); line-height: 1.5; }

    /* action log */
    .action-log { padding: 6px 13px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
    .log-title { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
    .log-entry { font-size: 10px; color: var(--text2); display: flex; gap: 6px; line-height: 1.5; }
    .log-pos { font-weight: 600; color: var(--text); min-width: 62px; flex-shrink: 0; }
    .c-fold { color: #a32d2d; } .c-call { color: #185fa5; } .c-raise { color: #085041; }

    /* checklist */
    .cl-section { padding: 7px 13px; border-bottom: 0.5px solid var(--border); }
    .cl-label { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .cl-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); cursor: pointer; padding: 3px 0; user-select: none; }
    .cl-cb { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .cl-cb.on { background: #1d9e75; border-color: #1d9e75; }
    .cl-cb.on::after { content: ''; display: block; width: 8px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); }
    .cl-item.done span { text-decoration: line-through; opacity: 0.5; }

    /* voice */
    .voice-section { padding: 8px 13px; border-bottom: 0.5px solid var(--border); }
    .voice-btn { width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .voice-btn.recording { background: #fcebeb; border-color: #f09595; color: #a32d2d; }
    .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: #e24b4a; flex-shrink: 0; }
    .recording .rec-dot { animation: rp 1s infinite; }
    @keyframes rp { 0%,100%{opacity:1}50%{opacity:0.3} }
    .voice-transcript { margin-top: 6px; font-size: 11px; color: var(--text); font-style: italic; line-height: 1.5; padding: 6px 8px; background: var(--bg3); border-radius: 6px; display: none; }
    .voice-transcript.show { display: block; }

    /* bet area */
    .bet-area { padding: 8px 13px; border-bottom: 0.5px solid var(--border); }
    .bet-label { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .bet-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] { flex: 1; height: 4px; accent-color: #1d9e75; }
    .bet-val { font-size: 14px; font-weight: 600; color: var(--text); min-width: 60px; text-align: right; }
    .bet-presets { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .bp { font-size: 10px; padding: 4px 9px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; }
    .bp:active { background: var(--bg3); }

    /* action buttons */
    .act-btns { padding: 8px 13px; display: flex; gap: 6px; }
    .act { flex: 1; padding: 11px 4px; font-size: 12px; font-weight: 600; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--text); }
    .act:active { opacity: 0.75; }
    .act.fold { color: #a32d2d; border-color: #f09595; }
    .act.call { color: var(--blue-text); border-color: var(--blue-border); }
    .act.raise { color: var(--green-text); border-color: var(--green-border2); background: var(--green-bg); }
    .sit-info { padding: 4px 13px 8px; font-size: 9px; color: var(--text3); display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── PLAYERS ── */
    .pl-item { display: flex; gap: 10px; padding: 10px 13px; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
    .pl-ava { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .pl-pos { font-size: 9px; padding: 2px 7px; border-radius: 8px; font-weight: 600; }
    .vpip-bar-bg { height: 3px; border-radius: 2px; margin-top: 4px; background: var(--bg3); }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
    .stat-c { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px; }
    .stat-l { font-size: 10px; color: var(--text2); margin-bottom: 4px; }
    .stat-v { font-size: 22px; font-weight: 600; color: var(--text); }
    .stat-s { font-size: 10px; color: var(--text3); margin-top: 2px; }
    .sec-title { padding: 10px 13px 4px; font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
    .skill-row { display: flex; align-items: center; gap: 8px; padding: 4px 13px; }
    .skill-nm { font-size: 11px; color: var(--text2); width: 112px; flex-shrink: 0; }
    .skill-bg { flex: 1; height: 7px; background: var(--bg3); border-radius: 4px; }
    .skill-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .skill-pc { font-size: 10px; color: var(--text3); width: 30px; text-align: right; }

    /* ── HISTORY ── */
    .hist-item { padding: 10px 13px; border-bottom: 0.5px solid var(--border); }
    .hist-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .hist-score { font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
    .hist-body { font-size: 11px; color: var(--text2); line-height: 1.5; }

    /* ── NEW HAND ── */
    .new-hand-btn { margin: 0 10px 10px; width: calc(100% - 20px); padding: 13px; font-size: 14px; font-weight: 600; border-radius: var(--radius); border: 0.5px solid var(--green-border2); background: var(--green-bg); color: var(--green-text); cursor: pointer; }
    .new-hand-btn:active { opacity: 0.8; }

    /* ── ANALYSIS MODAL ── */
    #analysis-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; padding: 20px 12px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
    #analysis-overlay.show { display: block; }
    .analysis-card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; max-width: 500px; margin: 0 auto; }
    .analysis-head { padding: 14px 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; background: var(--bg2); }
    .analysis-body { padding: 14px 16px; }
    .analysis-sec { margin-bottom: 12px; }
    .analysis-sec-t { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .analysis-sec-body { font-size: 13px; color: var(--text2); line-height: 1.65; }
    .analysis-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
    .analysis-tag { font-size: 10px; padding: 3px 8px; border-radius: 8px; background: var(--bg2); color: var(--text2); }
    .close-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; flex-shrink: 0; }
    .loading-state { padding: 40px 20px; text-align: center; font-size: 13px; color: var(--text2); }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: #1d9e75; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* safe area bottom padding */
    .safe-bottom { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
<div id="app">
  <div id="nav">
    <button class="nav-btn active" onclick="go('game')" id="nav-game">Spiel</button>
    <button class="nav-btn" onclick="go('players')" id="nav-players">Spieler</button>
    <button class="nav-btn" onclick="go('stats')" id="nav-stats">Stats</button>
    <button class="nav-btn" onclick="go('history')" id="nav-history">Verlauf</button>
  </div>

  <div id="content">

    <!-- GAME -->
    <div class="screen active" id="screen-game">
      <div class="table-wrap">
        <div class="felt-outer">
          <div class="felt-ellipse">
            <div class="felt-center">
              <div style="font-size:8px;color:rgba(255,255,255,0.4)" id="phase-lbl">Preflop</div>
              <div style="display:flex;gap:4px;align-items:center;min-height:38px" id="community">
                <div class="cc-ph"></div><div class="cc-ph"></div><div class="cc-ph"></div><div class="cc-ph"></div><div class="cc-ph"></div>
              </div>
              <div class="pot-label">Pot: <span id="pot-lbl">—</span></div>
            </div>
          </div>
          <div class="seats-wrap" id="seats-wrap"></div>
        </div>
      </div>

      <div class="scenario-badge" id="scenario-badge">Hand wird generiert…</div>

      <div class="ap">
        <div class="ap-head">
          <span class="ap-title" id="ap-title">Dein Zug</span>
          <span class="phase-pill" id="phase-pill">Preflop</span>
        </div>
        <div class="action-log">
          <div class="log-title">Bisherige Aktionen</div>
          <div id="action-log"></div>
        </div>
        <div class="cl-section">
          <div class="cl-label">Denkprozess-Checkliste</div>
          <div id="checklist"></div>
        </div>
        <div class="voice-section">
          <button class="voice-btn" id="voice-btn" onclick="toggleRec()">
            <div class="rec-dot"></div>
            <span id="voice-txt">Gedanken aufnehmen</span>
            <span style="margin-left:auto;font-size:10px;color:var(--text3)" id="rec-time"></span>
          </button>
          <div class="voice-transcript" id="voice-transcript"></div>
        </div>
        <div class="bet-area">
          <div class="bet-label" id="bet-label">Raise Grösse</div>
          <div class="bet-row">
            <input type="range" id="bet-slider" min="0" max="100000" step="100" value="1500" oninput="updateBet()">
            <span class="bet-val" id="bet-val">—</span>
          </div>
          <div class="bet-presets" id="bet-presets"></div>
        </div>
        <div class="act-btns" id="act-btns"></div>
        <div class="sit-info safe-bottom" id="sit-info"></div>
      </div>
    </div>

    <!-- PLAYERS -->
    <div class="screen" id="screen-players">
      <div id="players-list" class="safe-bottom"></div>
    </div>

    <!-- STATS -->
    <div class="screen" id="screen-stats">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="sec-title">Skill-Entwicklung</div>
      <div id="skill-bars" style="padding-bottom:16px;margin-top:4px"></div>
      <div style="padding:0 10px 12px">
        <button class="new-hand-btn" onclick="newHand()">Neue Hand starten</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="screen" id="screen-history">
      <div id="history-list" class="safe-bottom">
        <div style="padding:40px 16px;text-align:center;font-size:13px;color:var(--text3)">
          Noch keine Hände gespielt.
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ANALYSIS MODAL -->
<div id="analysis-overlay">
  <div class="analysis-card">
    <div class="analysis-head">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text)" id="analysis-title">Analyse</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px" id="analysis-subtitle"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="analysis-score-pill" style="font-size:12px;padding:3px 11px;border-radius:10px;font-weight:700"></span>
        <button class="close-btn" onclick="closeAnalysis()">Schliessen</button>
      </div>
    </div>
    <div class="analysis-body" id="analysis-body">
      <div class="loading-state">
        <div class="spinner"></div>
        <div>Claude analysiert…</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────

// ── HELPERS ──────────────────────────────────────────────────────────────────
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function posGrp(p){if(p==='UTG'||p==='UTG+1')return 'UTG';if(p==='MP1'||p==='MP2')return 'MP';return p;}
function fmt(n){return n.toLocaleString('de-CH');}

function posColor(pos){
  if(pos==='BTN') return {bg:'#854F0B',tc:'#FAC775'};
  if(pos==='SB'||pos==='BB') return {bg:'#185FA5',tc:'#B5D4F4'};
  if(pos==='UTG'||pos==='UTG+1') return {bg:'#791F1F',tc:'#F7C1C1'};
  return {bg:'#27500A',tc:'#C0DD97'};
}

// ── SCENARIO GENERATOR ────────────────────────────────────────────────────────
function generateScenario() {
  const blinds = pick(BLINDS);
  const bb = blinds.bb;
  const heroHand = pick(HERO_HANDS);
  const heroPos = pick(HERO_POS_OPTIONS);
  const heroActIdx = ACTING_ORDER.indexOf(heroPos);
  const shuffled = shuffle(PLAYER_POOL);

  const seats = POS_ORDER.map((pos, i) => ({
    ...shuffled[i],
    pos, isHero: pos === heroPos,
    stack: pos === heroPos ? rnd(18,55)*bb : rnd(15,70)*bb,
    bet: 0, folded: false, dealer: pos === 'BTN',
  }));

  const sbSeat = seats.find(s => s.pos === 'SB');
  const bbSeat = seats.find(s => s.pos === 'BB');
  sbSeat.bet = blinds.sb;
  bbSeat.bet = blinds.bb;

  let pot = blinds.sb + blinds.bb + (blinds.ante * 9);
  let raiser = null, threebet = null;
  const log = [];
  log.push({pos:'SB', name:sbSeat.name, act:'postet SB', amt:blinds.sb, cls:'c-call'});
  log.push({pos:'BB', name:bbSeat.name, act:'postet BB', amt:blinds.bb, cls:'c-call'});

  for (let i = 0; i < heroActIdx; i++) {
    const pos = ACTING_ORDER[i];
    const seat = seats.find(s => s.pos === pos);
    if (!seat || seat.isHero) continue;
    const pg = posGrp(pos);
    const r = Math.random();

    if (!raiser) {
      const chance = seat.raisePct[pg] || seat.raisePct['MP'] || 0.15;
      if (r < chance) {
        let mult = seat.skill === 'Beginner' ? rnd(25,38)/10 : rnd(21,30)/10;
        const amt = Math.max(bb*2, Math.round(bb*mult/100)*100);
        seat.bet = amt; pot += amt;
        raiser = {pos, seat, amt};
        log.push({pos, name:seat.name, act:'open-raist auf', amt, cls:'c-raise'});
      } else {
        seat.folded = true;
        log.push({pos, name:seat.name, act:'foldet', cls:'c-fold'});
      }
    } else if (!threebet) {
      if (r < seat.threebet) {
        const amt = Math.max(raiser.amt*3, Math.round(raiser.amt*rnd(28,35)/10/100)*100);
        seat.bet = amt; pot += amt;
        threebet = {pos, seat, amt};
        log.push({pos, name:seat.name, act:'3-bets auf', amt, cls:'c-raise'});
      } else if (r < seat.threebet + seat.coldcall) {
        seat.bet = raiser.amt; pot += raiser.amt;
        log.push({pos, name:seat.name, act:'callt', amt:raiser.amt, cls:'c-call'});
      } else {
        seat.folded = true;
        log.push({pos, name:seat.name, act:'foldet', cls:'c-fold'});
      }
    } else {
      if (r < seat.fourbet) {
        const amt = Math.round(threebet.amt*rnd(22,30)/10/100)*100;
        seat.bet = amt; pot += amt;
        log.push({pos, name:seat.name, act:'4-bets auf', amt, cls:'c-raise'});
      } else if (r < seat.fourbet + 0.15) {
        seat.bet = threebet.amt; pot += threebet.amt;
        log.push({pos, name:seat.name, act:'callt', amt:threebet.amt, cls:'c-call'});
      } else {
        seat.folded = true;
        log.push({pos, name:seat.name, act:'foldet', cls:'c-fold'});
      }
    }
  }

  const heroSeat = seats.find(s => s.isHero);
  heroSeat.name = 'Du (Hero)'; heroSeat.short = 'DU';
  heroSeat.color = '#1D9E75'; heroSeat.tc = '#E1F5EE';

  let situation, callAmt = 0, minRaise = 0;
  if (!raiser) { situation = 'open'; minRaise = bb*2; }
  else if (!threebet) { situation = 'facing_open'; callAmt = raiser.amt; minRaise = raiser.amt*2; }
  else { situation = 'facing_3bet'; callAmt = threebet.amt; minRaise = threebet.amt*3; }

  const afterHero = ACTING_ORDER.slice(heroActIdx+1)
    .map(p => seats.find(s => s.pos === p))
    .filter(s => s && !s.folded && !s.isHero);

  return {seats, heroSeat, heroHand, heroPos, blinds, pot, log, situation, callAmt, minRaise, raiser, threebet, afterHero};
}

    const ini = (p.short||p.name.substring(0,2)).toUpperCase();

    if (p.folded && !p.isHero) h += `<span style="font-size:6px;color:rgba(255,255,255,0.3)">fold</span>`;

}

// ── SPEECH RECOGNITION ───────────────────────────────────────────────────────
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'de-DE';
  r.continuous = true;
  r.interimResults = true;
  return r;
}

function toggleRec() {
  const btn = document.getElementById('voice-btn');
  const txtEl = document.getElementById('voice-txt');
  const transcriptEl = document.getElementById('voice-transcript');

  if (!STATE.recording) {
    STATE.recording = true;
    STATE.transcript = '';
    STATE.recSec = 0;
    btn.classList.add('recording');
    txtEl.textContent = 'Aufnahme läuft… (tippen zum Stoppen)';

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      // Native speech recognition
      STATE.recognition = new SR();
      STATE.recognition.lang = 'de-DE';
      STATE.recognition.continuous = true;
      STATE.recognition.interimResults = true;
      let finalText = '';

      STATE.recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
          else interim += e.results[i][0].transcript;
        }
        STATE.transcript = finalText + interim;
        transcriptEl.textContent = STATE.transcript;
        transcriptEl.classList.add('show');
      };

      STATE.recognition.onerror = () => {
        txtEl.textContent = 'Mikrofon nicht verfügbar — tippe deine Gedanken';
      };

      try { STATE.recognition.start(); } catch(e) {}
    } else {
      // Fallback: timer only
      transcriptEl.textContent = 'Spreche laut… (Transkript nach Stop verfügbar)';
      transcriptEl.classList.add('show');
    }

    STATE.recTimer = setInterval(() => {
      STATE.recSec++;
      const m = Math.floor(STATE.recSec/60), s = STATE.recSec%60;
      document.getElementById('rec-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);

  } else {
    // Stop recording
    STATE.recording = false;
    clearInterval(STATE.recTimer);
    if (STATE.recognition) { try { STATE.recognition.stop(); } catch(e) {} STATE.recognition = null; }
    btn.classList.remove('recording');
    txtEl.textContent = 'Aufnahme gespeichert ✓';
    document.getElementById('rec-time').textContent = '';
    STATE.recs++;
    if (!STATE.transcript) {
      STATE.transcript = '[Aufnahme ohne Text — ergänze deine Gedanken im Analyse-Prompt]';
    }
  }
}

// ── ACTION & ANALYSIS ─────────────────────────────────────────────────────────
async function doAction(action) {
  const sc = STATE.sc;
  const bb = sc.blinds.bb;
  const heroStack = sc.heroSeat.stack;
  const stackBB = Math.round(heroStack/bb);
  const pot = sc.pot;
  const potOdds = sc.situation!=='open' ? Math.round(sc.callAmt/(pot+sc.callAmt)*100) : null;

  const actionStr = action==='fold' ? 'FOLD'
    : action==='call' ? `CALL ${fmt(sc.callAmt)} (passiv)`
    : `${sc.situation==='open'?'OPEN-RAISE':sc.situation==='facing_open'?'3-BET':'4-BET'} auf ${fmt(STATE.betAmt)} (${(STATE.betAmt/bb).toFixed(1)}BB)`;

  const situDesc = sc.situation==='open'
    ? 'Hero ist first-to-act (alle vor ihm haben gefoldet)'
    : sc.situation==='facing_open'
    ? `${sc.raiser.pos} (${sc.raiser.seat.name}, ${sc.raiser.seat.type}, VPIP ${sc.raiser.seat.vpip}/PFR ${sc.raiser.seat.pfr}) hat auf ${fmt(sc.raiser.amt)} open-geraist`
    : `${sc.threebet.pos} (${sc.threebet.seat.name}, ${sc.threebet.seat.type}) hat 3-bet auf ${fmt(sc.threebet.amt)}`;

  const afterDesc = sc.afterHero.length
    ? sc.afterHero.map(s=>`${s.pos}: ${s.name} (${s.type}, VPIP ${s.vpip}%, PFR ${s.pfr}%)`).join('\n    ')
    : 'niemand mehr';

  const checkStatus = CL_ITEMS.map((item,i) => `${STATE.checks.has(i)?'✓':'✗'} ${item}`).join('\n');

  STATE.hands++;

  // Show modal with loading
  document.getElementById('analysis-title').textContent = `${sc.heroHand.desc} · ${sc.heroPos} · ${actionStr}`;
  document.getElementById('analysis-subtitle').textContent = `Blinds ${sc.blinds.label} · ${stackBB}BB`;
  document.getElementById('analysis-score-pill').textContent = '';
  document.getElementById('analysis-score-pill').style.cssText = '';
  document.getElementById('analysis-body').innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Claude analysiert…</div></div>';
  document.getElementById('analysis-overlay').classList.add('show');

  // Build prompt for API call
  const prompt = `Du bist ein erfahrener No-Limit Hold'em MTT-Coach. Analysiere diese Preflop-Entscheidung. Der Spieler ist zwischen Recreational und Semi-Pro Niveau, spielt Live MTT.

HAND:
- Karten: ${sc.heroHand.desc}
- Position: ${sc.heroPos}, Stack: ${fmt(heroStack)} (${stackBB}BB)
- Blinds: ${sc.blinds.label}, Pot: ${fmt(pot)}
${potOdds?`- Pot Odds: ${potOdds}%`:''}

SITUATION: ${situDesc}

SPIELER DAHINTER:
${afterDesc}

AKTION: ${actionStr}

DENKPROZESS (${STATE.checks.size}/5):
${checkStatus}

SPRACHNOTIZ: "${STATE.transcript||'(keine)'}"

Antworte NUR als JSON ohne Backticks:
{"score":<0-100>,"entscheidung":"<optimal|gut|suboptimal|fehler>","kurzfazit":"<1 Satz>","hauptfeedback":"<3-4 Sätze>","sizing":"<War das Sizing korrekt? Was wäre optimal?>","gegner":"<Wie reagieren die Spielertypen dahinter?>","denkprozess":"<1-2 Sätze zum Prozess>","verbesserung":"<1-2 Sätze>","skill_scores":{"range":<0-100>,"board":<0-100>,"player":<0-100>,"process":<0-100>,"odds":<0-100>},"tags":["<tag1>","<tag2>","<tag3>"]}`;

  try {
    const apiKey = STATE.apiKey;
    if (!apiKey) {
      // No API key — show prompt for manual analysis
      showManualAnalysisPrompt(prompt, actionStr, sc, action);
      return;
    }

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{role:'user',content:prompt}] })
    });

    if (!resp.ok) throw new Error(`API Error ${resp.status}`);
    const data = await resp.json();
    const raw = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const r = JSON.parse(raw.replace(/```json|```/g,'').trim());

    STATE.scores.push(r.score);
    for (const k of Object.keys(r.skill_scores||{})) {
      STATE.skill[k] = (STATE.skill[k]*STATE.skillN[k]+r.skill_scores[k])/(STATE.skillN[k]+1);
      STATE.skillN[k]++;
    }

    const histEntry = {
      hand: sc.heroHand.desc, pos: sc.heroPos, action: actionStr,
      blinds: sc.blinds.label, stackBB, score: r.score,
      entscheidung: r.entscheidung, kurzfazit: r.kurzfazit,
      timestamp: Date.now(),
    };
    STATE.history.unshift(histEntry);
    if (STATE.history.length > 50) STATE.history.pop();
    saveState();

    renderAnalysis(r);

  } catch(e) {
    showManualAnalysisPrompt(prompt, actionStr, sc, action);
  }
}

function showManualAnalysisPrompt(prompt, actionStr, sc, action) {
  // Copy prompt to clipboard and show instructions
  if (navigator.clipboard) navigator.clipboard.writeText(prompt).catch(()=>{});

  document.getElementById('analysis-body').innerHTML = `
    <div style="padding:8px 0">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">API-Key einrichten für automatische Analyse</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px">
        Gib deinen Anthropic API-Key ein, damit die Analyse direkt in der App passiert. Der Key wird lokal auf deinem Gerät gespeichert.
      </div>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." style="width:100%;padding:10px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;margin-bottom:8px">
      <button onclick="saveApiKey()" style="width:100%;padding:10px;border-radius:8px;border:none;background:#1d9e75;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px">Speichern & Analyse starten</button>
      <div style="font-size:11px;color:var(--text3);padding:10px;background:var(--bg2);border-radius:8px;line-height:1.5">
        Ohne API-Key: Der Analyse-Prompt wurde in die Zwischenablage kopiert. Füge ihn in Claude.ai ein um die Analyse zu erhalten.
      </div>
    </div>`;
}

function saveApiKey() {
  const key = document.getElementById('api-key-input')?.value?.trim();
  if (!key || !key.startsWith('sk-')) {
    alert('Bitte einen gültigen Anthropic API-Key eingeben (beginnt mit sk-ant-...)');
    return;
  }
  STATE.apiKey = key;
  saveState();
  closeAnalysis();
  // Retry
  setTimeout(() => doAction('retry'), 100);
}

function renderAnalysis(r) {
  const score = Math.round(r.score);
  const sc2 = score>=70?'#085041':score>=50?'#633806':'#791F1F';
  const sb2 = score>=70?'#E1F5EE':score>=50?'#FAEEDA':'#FCEBEB';
  const eb = {optimal:'#E1F5EE',gut:'#EAF3DE',suboptimal:'#FAEEDA',fehler:'#FCEBEB'}[r.entscheidung]||'#F1EFE8';
  const ec = {optimal:'#085041',gut:'#27500A',suboptimal:'#633806',fehler:'#791F1F'}[r.entscheidung]||'#5F5E5A';

  const pill = document.getElementById('analysis-score-pill');
  pill.textContent = `${score}/100`;
  pill.style.cssText = `font-size:12px;padding:3px 11px;border-radius:10px;font-weight:700;background:${sb2};color:${sc2}`;

  const tags = (r.tags||[]).map(t=>`<span class="analysis-tag">${t}</span>`).join('');

  document.getElementById('analysis-body').innerHTML = `
    <div class="analysis-sec">
      <div class="analysis-sec-t">Entscheidung</div>
      <div class="analysis-sec-body">
        <span style="font-size:11px;padding:2px 8px;border-radius:7px;background:${eb};color:${ec};font-weight:700">${(r.entscheidung||'').toUpperCase()}</span>
        <span style="margin-left:8px">${r.kurzfazit||''}</span>
      </div>
    </div>
    <div class="analysis-sec">
      <div class="analysis-sec-t">Coaching-Feedback</div>
      <div class="analysis-sec-body">${r.hauptfeedback||''}</div>
    </div>
    <div class="analysis-sec">
      <div class="analysis-sec-t">Sizing-Analyse</div>
      <div class="analysis-sec-body">${r.sizing||'—'}</div>
    </div>
    <div class="analysis-sec">
      <div class="analysis-sec-t">Gegner-Reaktionen</div>
      <div class="analysis-sec-body">${r.gegner||'—'}</div>
    </div>
    <div class="analysis-sec">
      <div class="analysis-sec-t">Denkprozess</div>
      <div class="analysis-sec-body">${r.denkprozess||''}</div>
    </div>
    <div class="analysis-sec">
      <div class="analysis-sec-t">Nächstes Mal</div>
      <div class="analysis-sec-body">${r.verbesserung||''}</div>
    </div>
    <div class="analysis-tags">${tags}</div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button onclick="closeAnalysis()" style="flex:1;padding:11px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer">Schliessen</button>
      <button onclick="closeAnalysis();newHand();" style="flex:1;padding:11px;border-radius:10px;border:none;background:#1d9e75;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Neue Hand ▶</button>
    </div>`;
}

function closeAnalysis() {
  document.getElementById('analysis-overlay').classList.remove('show');
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function renderPlayers() {
  const sc = STATE.sc;
  if (!sc) { document.getElementById('players-list').innerHTML='<div style="padding:20px;font-size:13px;color:var(--text3)">Starte eine Hand.</div>'; return; }
  document.getElementById('players-list').innerHTML = sc.seats.map(p => {
    const pc = posColor(p.pos);
    const stackBB = Math.round(p.stack/sc.blinds.bb);
    return `<div class="pl-item">
      <div class="pl-ava" style="background:${p.color};color:${p.tc}">${(p.short||p.name.substring(0,2)).toUpperCase()}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
          <span style="font-size:13px;font-weight:600;color:var(--text)">${p.isHero?'Du (Hero)':p.name}</span>
          <span class="pl-pos" style="background:${pc.bg};color:${pc.tc}">${p.pos}</span>
        </div>
        <div style="font-size:11px;color:var(--text2)">${p.type}${p.vpip?` · VPIP ${p.vpip}% · PFR ${p.pfr}%`:''} · ${stackBB}BB</div>
        ${p.vpip?`<div class="vpip-bar-bg"><div style="width:${Math.min(p.vpip,100)}%;background:${p.color};height:3px;border-radius:2px"></div></div>`:''}
        ${!p.isHero&&p.notes?`<div style="font-size:10px;color:var(--text3);margin-top:3px">${p.notes}</div>`:''}
        ${p.folded&&!p.isHero?`<div style="font-size:10px;color:#a32d2d;margin-top:2px">Preflop gefoldet</div>`:''}
        ${p.bet>0&&!p.isHero?`<div style="font-size:10px;color:#085041;margin-top:2px">Einsatz: ${fmt(p.bet)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const avg = STATE.scores.length ? Math.round(STATE.scores.reduce((a,b)=>a+b)/STATE.scores.length) : '—';
  let bk=null,bv=0;
  for (const k in STATE.skill) { if (STATE.skillN[k]>0&&STATE.skill[k]>bv){bv=STATE.skill[k];bk=k;} }
  const sn={range:'Range Reading',board:'Board Texture',player:'Spielertypen',process:'Denkprozess',odds:'Pot Odds'};
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-c"><div class="stat-l">Hände gespielt</div><div class="stat-v">${STATE.hands}</div><div class="stat-s">total</div></div>
    <div class="stat-c"><div class="stat-l">Ø Score</div><div class="stat-v">${avg}</div><div class="stat-s">von 100</div></div>
    <div class="stat-c"><div class="stat-l">Sprachnotizen</div><div class="stat-v">${STATE.recs}</div></div>
    <div class="stat-c"><div class="stat-l">Stärkstes Gebiet</div><div class="stat-v" style="font-size:13px">${bk?sn[bk]:'—'}</div></div>`;
  document.getElementById('skill-bars').innerHTML = SKILLS.map(sk => {
    const p = STATE.skillN[sk.key]>0 ? Math.round(STATE.skill[sk.key]) : 0;
    return `<div class="skill-row"><span class="skill-nm">${sk.name}</span><div class="skill-bg"><div class="skill-fill" style="width:${p}%;background:${sk.color}"></div></div><span class="skill-pc">${p}%</span></div>`;
  }).join('');
}

function renderHistory() {
  if (!STATE.history.length) {
    document.getElementById('history-list').innerHTML = '<div style="padding:40px 16px;text-align:center;font-size:13px;color:var(--text3)">Noch keine Hände gespielt.</div>';
    return;
  }
  document.getElementById('history-list').innerHTML = STATE.history.map(h => {
    const sc2=h.score>=70?'#085041':h.score>=50?'#633806':'#791F1F';
    const sb2=h.score>=70?'#E1F5EE':h.score>=50?'#FAEEDA':'#FCEBEB';
    const dt = new Date(h.timestamp).toLocaleString('de-CH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `<div class="hist-item">
      <div class="hist-head">
        <span style="font-size:12px;font-weight:600;color:var(--text)">${h.hand} · ${h.pos} · ${h.blinds}</span>
        <span class="hist-score" style="background:${sb2};color:${sc2}">${Math.round(h.score)}/100</span>
      </div>
      <div class="hist-body">${h.action}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:3px">${h.kurzfazit||''} · ${dt}</div>
    </div>`;
  }).join('');
}

function newHand() {
  STATE.checks = new Set();
  STATE.recording = false;
  clearInterval(STATE.recTimer);
  if (STATE.recognition) { try { STATE.recognition.stop(); } catch(e){} STATE.recognition = null; }
  STATE.transcript = '';
  document.getElementById('voice-btn').classList.remove('recording');
  document.getElementById('voice-txt').textContent = 'Gedanken aufnehmen';
  document.getElementById('rec-time').textContent = '';
  document.getElementById('voice-transcript').classList.remove('show');
  document.getElementById('voice-transcript').textContent = '';

  const sc = generateScenario();
  STATE.sc = sc;
  buildSeats(sc);
  buildLog(sc);
  buildActionPanel(sc);
  document.getElementById('pot-lbl').textContent = fmt(sc.pot);
  go('game');
}

function go(s) {
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  if (s==='players') renderPlayers();
  if (s==='stats') renderStats();
  if (s==='history') renderHistory();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
newHand();

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
